# ─────────────────────────────────────────────────────────────────────────────
# CD Workflow – shopizer-shop-reactjs (React)
#
# Triggered automatically after a successful CI/CD Pipeline run, or manually.
#
# What this workflow does:
#   1. Downloads the pre-built React artifact from CI
#   2. Checks out shopizer-infra for the Dockerfile + nginx config
#   3. Injects/overwrites build-info.json with Docker build metadata
#   4. Builds a production-grade Nginx Docker image
#   5. Tags as: latest  •  {semver}  •  {semver}-{short-sha}
#   6. Exports and uploads the image as a loadable .tar.gz artifact
#
# Local deployment:
#   ./deployment/deploy-local.sh --react-tag <image-tag>
# ─────────────────────────────────────────────────────────────────────────────
name: CD – React Shop

on:
  workflow_run:
    # Must match the name: field of the CI workflow in this repo exactly
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main, master, develop]

  workflow_dispatch:
    inputs:
      ci_run_id:
        description: >
          CI workflow run ID to deploy
          (leave blank to use the latest successful run)
        required: false
        type: string

env:
  IMAGE_NAME: shopizer-react
  # Infra repo that holds the Dockerfile and nginx.conf
  INFRA_REPO: ${{ github.repository_owner }}/shopizer-infra

# ── Job 1: Guard – only proceed on CI success ──────────────────────────────
jobs:
  guard:
    name: Guard – verify CI succeeded
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      ci_run_id:     ${{ steps.check.outputs.ci_run_id }}
      head_sha:      ${{ steps.check.outputs.head_sha }}

    steps:
      - name: Evaluate trigger
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            echo "CI conclusion: ${CONCLUSION}"
            if [[ "${CONCLUSION}" != "success" ]]; then
              echo "CI run did not succeed – skipping deployment."
              echo "should_deploy=false" >> $GITHUB_OUTPUT
            else
              echo "should_deploy=true"                                     >> $GITHUB_OUTPUT
              echo "ci_run_id=${{ github.event.workflow_run.id }}"         >> $GITHUB_OUTPUT
              echo "head_sha=${{ github.event.workflow_run.head_sha }}"    >> $GITHUB_OUTPUT
            fi
          else
            # Manual dispatch
            echo "should_deploy=true"              >> $GITHUB_OUTPUT
            echo "ci_run_id=${{ github.event.inputs.ci_run_id }}" >> $GITHUB_OUTPUT
            echo "head_sha=${{ github.sha }}"       >> $GITHUB_OUTPUT
          fi

# ── Job 2: Build Docker image ──────────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should_deploy == 'true'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      version:   ${{ steps.meta.outputs.version }}

    steps:
      # ── Checkout this repo (package.json for version extraction) ──────────
      - name: Checkout shopizer-shop-reactjs
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.head_sha }}
          sparse-checkout: |
            package.json
          sparse-checkout-cone-mode: false

      # ── Compute image tags ─────────────────────────────────────────────────
      - name: Extract version and compute image tags
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ needs.guard.outputs.head_sha }}" | cut -c1-8)
          IMAGE_TAG="${VERSION}-${SHORT_SHA}"
          echo "version=${VERSION}"       >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}"   >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}"   >> $GITHUB_OUTPUT
          echo "──────────────────────────────────────"
          echo "  version   : ${VERSION}"
          echo "  short_sha : ${SHORT_SHA}"
          echo "  image_tag : ${IMAGE_TAG}"

      # ── Resolve which CI run ID to pull the artifact from ─────────────────
      - name: Resolve CI run ID
        id: resolve_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ needs.guard.outputs.ci_run_id }}"
          if [[ -z "$RUN_ID" ]]; then
            echo "No run ID provided – fetching latest successful CI run…"
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "CI/CD Pipeline" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi
          echo "Using CI run ID: ${RUN_ID}"
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT

      # ── Download pre-built React artifact from CI ─────────────────────────
      # CI uploads: name=shopizer-react-build-{run_number}  path=build/
      # download-artifact v4 extracts the artifact contents flat into path:
      - name: Download build artifact from CI
        uses: actions/download-artifact@v4
        with:
          run-id:        ${{ steps.resolve_run.outputs.run_id }}
          github-token:  ${{ secrets.GITHUB_TOKEN }}
          pattern:       "shopizer-react-build-*"
          merge-multiple: true
          path: artifact-raw/

      # ── Normalise artifact layout into build/ ─────────────────────────────
      # CI's upload-artifact v4 strips the leading directory, so when the CI
      # uploads path: build/ the files land flat in artifact-raw/ (not in
      # artifact-raw/build/).  Handle all three possible layouts:
      #   a) flat layout  → artifact-raw/index.html, artifact-raw/static/, …
      #   b) nested build → artifact-raw/build/index.html, …
      #   c) tarball      → artifact-raw/build.tar.gz
      - name: Stage build directory
        run: |
          echo "── Raw artifact contents ──────────────────"
          find artifact-raw/ -maxdepth 2 | sort

          mkdir -p build

          if compgen -G "artifact-raw/*.tar.gz" > /dev/null; then
            echo "Found tarball – extracting…"
            tar -xzf artifact-raw/*.tar.gz -C build --strip-components=0

          elif [ -d "artifact-raw/build" ]; then
            echo "Found nested build/ directory – copying…"
            cp -r artifact-raw/build/. build/

          else
            echo "Found flat layout – copying artifact-raw/ → build/"
            cp -r artifact-raw/. build/
          fi

          echo ""
          echo "── Staged build contents (top-level) ──────"
          ls -la build/
          echo ""
          echo "Total files staged: $(find build/ -type f | wc -l | tr -d ' ')"

      # ── Overwrite build-info.json with Docker image metadata ─────────────
      # The CI already writes build/metadata/build-info.json from CI context.
      # We overwrite it here to add the Docker image tag that wasn't known yet.
      - name: Inject build-info.json
        run: |
          mkdir -p build/metadata
          cat > build/metadata/build-info.json <<EOF
          {
            "version":    "${{ steps.meta.outputs.version }}",
            "imageTag":   "${{ steps.meta.outputs.image_tag }}",
            "gitSha":     "${{ needs.guard.outputs.head_sha }}",
            "shortSha":   "${{ steps.meta.outputs.short_sha }}",
            "ciRunId":    "${{ steps.resolve_run.outputs.run_id }}",
            "cdRunId":    "${{ github.run_id }}",
            "builtAt":    "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repository": "${{ github.repository }}"
          }
          EOF
          echo "── build-info.json ──"
          cat build/metadata/build-info.json

      # ── Checkout shopizer-infra for Dockerfile + nginx.conf ──────────────
      # The Dockerfile and nginx.conf are maintained in shopizer-infra so all
      # three services share one infra repo.  Sparse-checkout only what we need.
      - name: Checkout shopizer-infra (Dockerfile + nginx.conf)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          path: shopizer-infra
          sparse-checkout: |
            deployment/react
          sparse-checkout-cone-mode: false

      # ── Copy staged build into the Dockerfile build context ──────────────
      - name: Copy build into Dockerfile context
        run: |
          cp -r build shopizer-infra/deployment/react/build
          echo "── Dockerfile context (deployment/react/) ──"
          ls -la shopizer-infra/deployment/react/

      # ── Docker build ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context:   shopizer-infra/deployment/react
          file:      shopizer-infra/deployment/react/Dockerfile
          push:      false
          load:      true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.image_tag }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

      # ── Export image as a loadable tar (for deploy-local.sh) ─────────────
      - name: Export image tar
        run: |
          mkdir -p image-export
          docker save \
            ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }} \
            | gzip \
            > image-export/shopizer-react-${{ steps.meta.outputs.image_tag }}.tar.gz
          echo "── Exported image ──"
          ls -lh image-export/

      # ── Upload image tar as a GitHub artifact ─────────────────────────────
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name:              docker-image-react-${{ steps.meta.outputs.image_tag }}
          path:              image-export/shopizer-react-${{ steps.meta.outputs.image_tag }}.tar.gz
          retention-days:    30
          compression-level: 0   # already gzipped

      # ── Job summary ───────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<END
          ## ✅ Docker Image Built – shopizer-react

          | Field        | Value |
          |-------------|-------|
          | Image tag   | \`${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}\` |
          | Version     | \`${{ steps.meta.outputs.version }}\` |
          | Git SHA     | \`${{ needs.guard.outputs.head_sha }}\` |
          | CI run ID   | \`${{ steps.resolve_run.outputs.run_id }}\` |
          | Artifact    | \`docker-image-react-${{ steps.meta.outputs.image_tag }}\` |

          **Deploy locally:**
          \`\`\`bash
          cd deployment
          ./deploy-local.sh --react-tag ${{ steps.meta.outputs.image_tag }}
          \`\`\`

          **Or load manually:**
          \`\`\`bash
          gh run download ${{ github.run_id }} \
            --repo ${{ github.repository }} \
            --pattern "docker-image-react-*" \
            --dir /tmp/react-image
          docker load < /tmp/react-image/shopizer-react-${{ steps.meta.outputs.image_tag }}.tar.gz
          \`\`\`
          END
